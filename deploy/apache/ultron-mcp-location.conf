# === BaseUFF MCP — trecho para INSERIR dentro do <VirtualHost *:443> de
# /etc/apache2/sites-available/ultron.cid-uff.net-le-ssl.conf (antes de </VirtualHost>).
#
# Expõe o servidor MCP (localhost:8088) em https://ultron.cid-uff.net/mcp/ com TLS
# do certificado que já existe. Autenticação por token Bearer (403 sem o header).
# Não requer novo subdomínio, DNS ou certificado.
#
# Depende de mods já habilitados: proxy, proxy_http, headers, setenvif, authz_core.

<Location /mcp>
    ProxyPass        http://127.0.0.1:8088/mcp
    ProxyPassReverse http://127.0.0.1:8088/mcp

    # Auth: só passa com  Authorization: Bearer <TOKEN>
    # (o token hex é seguro em regex; troque __MCP_TOKEN__ pelo real)
    SetEnvIf Authorization "^Bearer\s+__MCP_TOKEN__$" mcp_ok=1
    Require env mcp_ok
</Location>

RequestHeader set X-Forwarded-Proto "https"
ProxyTimeout 300
