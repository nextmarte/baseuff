# === BaseUFF MCP — trecho para INSERIR dentro do <VirtualHost *:443> de
# /etc/apache2/sites-available/ultron.cid-uff.net-le-ssl.conf (antes de </VirtualHost>).
#
# Expõe o servidor MCP em https://ultron.cid-uff.net/mcp/ com o TLS que já existe.
# Sem novo subdomínio, DNS ou certificado. A AUTENTICAÇÃO é no próprio servidor MCP
# (token Bearer por agente em data/mcp_tokens.txt) — aqui o Apache é só proxy TLS.
#
# Depende de mods já habilitados: proxy, proxy_http, headers.

ProxyPass        /mcp http://127.0.0.1:8088/mcp
ProxyPassReverse /mcp http://127.0.0.1:8088/mcp
RequestHeader set X-Forwarded-Proto "https"
ProxyTimeout 300
