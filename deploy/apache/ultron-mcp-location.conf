# === BaseUFF MCP — trecho para INSERIR dentro do <VirtualHost *:443> de
# /etc/apache2/sites-available/ultron.cid-uff.net-le-ssl.conf (antes de </VirtualHost>).
#
# Expõe o servidor MCP (localhost:8088) em https://ultron.cid-uff.net/mcp/ com o TLS
# do certificado que já existe. Sem novo subdomínio, DNS ou certificado.
#
# Autenticação por token Bearer, UMA CHAVE POR AGENTE (revogar = apagar a linha + reload).
# Depende de mods já habilitados: proxy, proxy_http, headers, setenvif, authz_core.

<Location /mcp>
    ProxyPass        http://127.0.0.1:8088/mcp
    ProxyPassReverse http://127.0.0.1:8088/mcp

    # Uma linha por agente (todas setam mcp_ok). Troque as chaves de verdade:
    SetEnvIf Authorization "^Bearer\s+__KEY_HERMES__$"   mcp_ok=1
    SetEnvIf Authorization "^Bearer\s+__KEY_OPENCLAW__$" mcp_ok=1
    SetEnvIf Authorization "^Bearer\s+__KEY_CLAUDE__$"   mcp_ok=1
    Require env mcp_ok
</Location>

RequestHeader set X-Forwarded-Proto "https"
ProxyTimeout 300
