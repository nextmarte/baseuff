# === BaseUFF MCP — trecho para INSERIR dentro do <VirtualHost *:443> de
# /etc/apache2/sites-available/ultron.cid-uff.net-le-ssl.conf (antes de </VirtualHost>).
#
# Expõe o servidor MCP em https://ultron.cid-uff.net/mcp/ com o TLS do certificado
# que já existe. Sem novo subdomínio, DNS ou certificado.
#
# A AUTENTICAÇÃO é feita no PRÓPRIO servidor MCP (token Bearer por agente, em
# data/mcp_tokens.txt) — adicionar/revogar agente é editar o arquivo, sem sudo nem
# reload do Apache. Aqui o Apache é só o proxy TLS.
#
# Depende de mods já habilitados: proxy, proxy_http, headers.

<Location /mcp>
    ProxyPass        http://127.0.0.1:8088/mcp
    ProxyPassReverse http://127.0.0.1:8088/mcp
</Location>

RequestHeader set X-Forwarded-Proto "https"
ProxyTimeout 300
