[project]
name = "uff-ingest"
version = "0.1.0"
description = "BaseUFF — ingestão: crawler polido e conectores por fonte"
requires-python = ">=3.11"
dependencies = [
    "uff-core",
    "httpx>=0.27",
    "selectolax>=0.3.21",
    "tenacity>=9.0",
    "trafilatura>=1.12",
]

[project.optional-dependencies]
# Instalado apenas no host de batch (skynet02): parsing pesado com modelos ML.
parse = [
    "docling>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uff_ingest"]

[tool.uv.sources]
uff-core = { workspace = true }
