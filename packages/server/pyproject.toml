[project]
name = "uff-server"
version = "0.1.0"
description = "BaseUFF — servidor MCP (FastMCP) de busca híbrida"
requires-python = ">=3.11"
dependencies = [
    "uff-core",
    "fastmcp>=2.0",
    "qdrant-client>=1.12",
    "uvicorn>=0.30",
    "starlette>=0.37",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uff_server"]

[tool.uv.sources]
uff-core = { workspace = true }
