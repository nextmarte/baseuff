[project]
name = "uff-core"
version = "0.1.0"
description = "BaseUFF — núcleo: schemas, config e catálogo"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uff_core"]
