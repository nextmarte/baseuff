[project]
name = "uff-embed"
version = "0.1.0"
description = "BaseUFF — worker de GPU (skynet02): parse Docling + embeddings BGE-M3"
requires-python = ">=3.11"
# Pacote de deploy no host de GPU (não é membro do workspace do ultron; torch fica isolado aqui).
dependencies = [
    "uff-core",
    "docling>=2.0",
    "FlagEmbedding>=1.3",
    "qdrant-client>=1.12",
    "pymupdf>=1.24",
    "trafilatura>=1.12",
    "fastapi>=0.115",
    "uvicorn>=0.30",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["uff_embed"]

[tool.uv.sources]
uff-core = { path = "../core", editable = true }
